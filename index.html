<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bavaria Jump & Run</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div id="hud">
      <span id="hud-lives">❤️ 3</span>
      <span id="hud-score">🥨 0</span>
      <span id="hud-level">Level 1</span>
      <button id="mute-btn" title="Ton an/aus">🔊</button>
    </div>
  

    <!-- Touch Controls -->
    <div id="touch-controls">
      <button class="touch-btn" id="btn-left">◀</button>
      <button class="touch-btn" id="btn-jump">▲</button>
      <button class="touch-btn" id="btn-right">▶</button>
      <button class="touch-btn" id="btn-attack" style="background:rgba(200,60,20,0.55);">⚔</button>
    </div>
  </div>

  <!-- Pause Overlay -->
  <div id="pause-overlay" style="display:none; position:absolute; inset:0; align-items:center; justify-content:center; background:rgba(0,0,0,0.72); z-index:90;">
    <div style="background:#1a0e00; border:2px solid #c88822; border-radius:14px; padding:40px 50px; text-align:center; font-family:'Cinzel',Georgia,serif; box-shadow:0 0 60px rgba(200,136,34,0.3); min-width:270px;">
      <div style="font-size:28px; color:#FFD700; margin-bottom:24px; letter-spacing:0.12em;">PAUSE</div>

      <div style="margin-bottom:16px;">
        <label style="display:block; font-size:11px; color:#ffe07a; margin-bottom:7px; letter-spacing:0.06em;">MUSIK</label>
        <input type="range" id="music-vol-slider" min="0" max="1" step="0.05"
          style="width:190px; accent-color:#FFD700; cursor:pointer;">
      </div>

      <div style="margin-bottom:30px;">
        <label style="display:block; font-size:11px; color:#ffe07a; margin-bottom:7px; letter-spacing:0.06em;">SOUNDEFFEKTE</label>
        <input type="range" id="sfx-vol-slider" min="0" max="1" step="0.05"
          style="width:190px; accent-color:#FFD700; cursor:pointer;">
      </div>

      <div style="font-size:13px; color:rgba(255,224,122,0.75); margin-bottom:6px;">P / ESC → Weiter spielen</div>
      <div style="font-size:12px; color:rgba(255,200,80,0.55); margin-bottom:6px;">Z / J / X → Schwert-Angriff</div>
      <div style="font-size:11px; color:rgba(255,200,80,0.45); margin-bottom:6px;">M → Hauptmenü</div>
      <div style="font-size:11px; color:rgba(255,200,80,0.3);">F → Vollbild ein/aus</div>
    </div>
  </div>

  <!-- Name-Input Overlay (Bestenliste) -->
  <div id="name-overlay" style="display:none; position:absolute; inset:0; align-items:center; justify-content:center; background:rgba(0,0,0,0.72); z-index:100;">
    <div style="background:#1e0e00; border:2px solid #c88822; border-radius:14px; padding:36px 40px; text-align:center; font-family:'Cinzel',Georgia,serif; box-shadow:0 0 60px rgba(200,136,34,0.3);">
      <div style="font-size:17px; color:#ffe07a; margin-bottom:6px; letter-spacing:0.05em;">BESTENLISTE</div>
      <div id="name-score-display" style="font-size:13px; color:rgba(255,200,80,0.7); margin-bottom:20px;"></div>
      <input id="name-input" maxlength="20" placeholder="Dein Name..."
        style="padding:10px 18px; font-size:15px; border-radius:8px; border:1.5px solid #c88822; background:#0e0600; color:#ffe07a; font-family:'Cinzel',Georgia,serif; width:210px; text-align:center; outline:none; display:block; margin:0 auto 16px;">
      <div style="display:flex; gap:12px; justify-content:center;">
        <button id="name-submit" style="padding:10px 28px; background:linear-gradient(180deg,#dc9b1e,#6b3c10); color:#1a0a01; border:none; border-radius:8px; font-size:13px; font-family:'Cinzel',Georgia,serif; font-weight:700; cursor:pointer; letter-spacing:0.04em;">EINTRAGEN</button>
        <button id="name-skip"   style="padding:10px 18px; background:rgba(100,55,8,0.5); color:rgba(255,224,122,0.6); border:1px solid rgba(200,146,42,0.3); border-radius:8px; font-size:12px; font-family:'Cinzel',Georgia,serif; cursor:pointer;">Überspringen</button>
      </div>
    </div>
  </div>

  <script src="game/input.js"></script>
  <script src="game/audio.js"></script>
  <script src="game/level.js"></script>
  <script src="game/player.js"></script>
  <script src="game/particles.js"></script>
  <script src="game/renderer.js"></script>
  <script src="game/leaderboard.js"></script>
  <script src="game/main.js"></script>
</body>
</html>
